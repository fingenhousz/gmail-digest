name: Gmail Newsletter Digest

on:
  schedule:
    # Every day at 7:00 AM Paris time (= 5:00 UTC in winter, 5:00 UTC in summer)
    # Using 6:00 UTC to account for CEST (UTC+2) → 8:00 AM Paris
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          GMAIL_LABEL: "Newsletters"
        run: python gmail_digest.py
