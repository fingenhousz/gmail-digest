name: Poll Telegram buttons

on:
  schedule:
    # Fallback only — primary trigger is cron-job.org calling workflow_dispatch
    # every minute. "Dis en plus" responsiveness matters here, and this repo
    # is public so there's no GitHub Actions minutes quota to worry about
    # (unlike eti-digest's poll, which is throttled to hourly since it's
    # less time-sensitive and this keeps cron-job.org's total load down).
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll for button clicks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python poll_telegram.py

      - name: Commit updated offset
        if: always()
        run: |
          if [ -n "$(git status --porcelain telegram_offset.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add telegram_offset.json
            git commit -m "chore: update telegram polling offset [skip ci]"
            git pull --rebase
            git push
          else
            echo "No change to telegram_offset.json"
          fi
